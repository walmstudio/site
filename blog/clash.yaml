rules:
  - DOMAIN-KEYWORD,appsflyer,REJECT
  - DOMAIN-KEYWORD,youtube,→ Remnawave
  - DOMAIN-KEYWORD,googlevideo,→ Remnawave
  - DOMAIN-KEYWORD,ytimg,→ Remnawave
  - DOMAIN-KEYWORD,instagram,→ Remnawave
  - DOMAIN-KEYWORD,discord,→ Remnawave
  - DOMAIN-SUFFIX,ru,DIRECT
  - DOMAIN-SUFFIX,su,DIRECT
  - DOMAIN-SUFFIX,xn--p1ai,DIRECT
  - GEOIP,RU,DIRECT
  - GEOIP,LAN,DIRECT,no-resolve
  - GEOSITE,category-ru,DIRECT
  - MATCH,→ Remnawave
